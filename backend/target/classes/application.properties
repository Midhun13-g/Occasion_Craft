

# ============================================
# SERVER CONFIGURATION
# ============================================
server.port=8080
server.servlet.context-path=/api
server.compression.enabled=true
server.compression.min-response-size=1024

# ============================================
# MYSQL DATABASE CONFIGURATION
# ============================================
# Connection URL: jdbc:mysql://host:port/database?parameters
spring.datasource.url=jdbc:mysql://localhost:3306/occasion_dp?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=app_user
spring.datasource.password=Midhun@Indhu2022
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Connection Pool Configuration (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.auto-commit=true

# ============================================
# JPA & HIBERNATE CONFIGURATION
# ============================================
# DDL Strategy Options:
# - validate: Check schema matches (production safe)
# - update: Auto-update schema (dev only)
# - create-drop: Recreate on startup (testing only)
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ============================================
# RAZORPAY PAYMENT GATEWAY
# ============================================
# Get keys from https://dashboard.razorpay.com/
razorpay.key-id=${RAZORPAY_KEY_ID:test_key_placeholder}
razorpay.key-secret=${RAZORPAY_KEY_SECRET:test_secret_placeholder}

# ============================================
# CORS CONFIGURATION
# ============================================
# Allow frontend to call backend API
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
app.cors.allowed-headers=*
app.cors.max-age=3600
app.cors.allow-credentials=true

# ============================================
# APPLICATION METADATA
# ============================================
spring.application.name=Occasion Craft Backend
app.name=Occasion Craft
app.version=1.0.0

# ============================================
# LOGGING CONFIGURATION
# ============================================
logging.level.root=INFO
logging.level.com.templatemart=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n

# ============================================
# JACKSON (JSON) CONFIGURATION
# ============================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
spring.jackson.default-property-inclusion=non_null

# ============================================
# FILE UPLOAD CONFIGURATION
# ============================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=uploads

# ============================================
# CLOUDINARY CONFIGURATION (Optional)
# ============================================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:placeholder}
cloudinary.api-key=${CLOUDINARY_API_KEY:placeholder}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:placeholder}

# ============================================
# LIQUIBASE CONFIGURATION (Optional)
# ============================================
spring.liquibase.enabled=false
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

# ============================================
# JWT CONFIGURATION
# ============================================
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ============================================
# ADMIN CONFIGURATION
# ============================================
admin.email=${ADMIN_EMAIL:admin@gmail.com}
admin.default.password=${ADMIN_PASSWORD:Admin@123}


